<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>本地拍照与读取</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;color:#fff}
  video#player{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;object-fit:contain;z-index:1}
  #startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:280px;height:80px;background:#000;border:2px solid #fff;color:#fff;font-size:28px;border-radius:16px;z-index:999}
  #countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:180px;color:#fff;font-weight:900;z-index:99;display:none}
  #gallery{position:fixed;bottom:0;left:0;width:100%;max-height:200px;overflow-x:auto;display:flex;gap:8px;padding:8px;background:rgba(0,0,0,0.8);z-index:100}
  #gallery img{height:160px;border-radius:8px;object-fit:cover}
</style>
</head>
<body>
<video id="player" playsinline muted preload="auto">
  <source src="https://alimov2.a.kwimgs.com/upic/2026/03/02/00/BMjAyNjAzMDIwMDU1NDNfNDM3NTI4ODcxNl8xODkzMTE1Njg3OTBfMl8z_b_Bd518217cb69a0d98d74bd00f0183b4a7.mp4?clientCacheKey=3xkdqdjhkyvpebk_b.mp4&tt=b&di=88a55fd&bp=10000" type="video/mp4">
</video>
<button id="startBtn">点击开始</button>
<div id="countdown"></div>
<div id="gallery"></div>

<script>
const player = document.getElementById('player');
const startBtn = document.getElementById('startBtn');
const countdown = document.getElementById('countdown');
const gallery = document.getElementById('gallery');

let playCount = 0;
const requiredPlays = 2;
let vibrateInt, flashInt, flashTrack;

// 预加载视频
player.load();

// 防止退出
window.addEventListener('beforeunload', e => {
  if(playCount < requiredPlays){e.preventDefault(); e.returnValue = ' '}
});
window.addEventListener('popstate', () => {
  if(playCount < requiredPlays) history.pushState(null,null,location.href);
});
history.pushState(null,null,location.href);

// 闪光灯控制
async function flash(){
  try{
    if(!flashTrack){
      let s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      flashTrack = s.getVideoTracks()[0];
    }
    await flashTrack.applyConstraints({advanced:[{torch:!flashTrack.getSettings().torch}]});
  }catch(e){}
}

// 开始按钮
startBtn.onclick = () => {
  startBtn.style.display = 'none';
  countdown.style.display = 'block';
  let n = 3;
  countdown.textContent = n;
  let t = setInterval(()=>{
    n--;
    if(n>0){
      countdown.textContent = n;
    }else{
      clearInterval(t);
      countdown.style.display = 'none';
      play();
      loadGallery(); // 开始时加载本地照片
    }
  },1000);
};

// 播放逻辑
function play(){
  player.muted = false;
  player.volume = 1;
  player.play();
  vibrateInt = setInterval(()=>navigator.vibrate(20), 50);
  flashInt = setInterval(flash, 100);
  player.onended = () => {
    playCount++;
    if(playCount >= requiredPlays){
      clearInterval(vibrateInt);
      clearInterval(flashInt);
      if(flashTrack) flashTrack.applyConstraints({advanced:[{torch:false}]});
      player.pause();
    }else{
      player.currentTime = 0;
      player.play();
    }
  };
}

// 保存到本地 localStorage（base64）
function saveLocal(name, dataUrl){
  let list = JSON.parse(localStorage.getItem('photos') || '[]');
  list.push({name, dataUrl, time:Date.now()});
  localStorage.setItem('photos', JSON.stringify(list));
}

// 从本地读取并展示
function loadGallery(){
  gallery.innerHTML = '';
  let list = JSON.parse(localStorage.getItem('photos') || '[]');
  list.forEach(item => {
    let img = document.createElement('img');
    img.src = item.dataUrl;
    img.title = item.name;
    gallery.appendChild(img);
  });
}

// 前后摄像头拍照并保存到本地
function takeBoth(){
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(shot).catch(()=>{});
  navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(shot).catch(()=>{});
}

function shot(stream){
  let v = document.createElement('video');
  v.srcObject = stream;
  v.play();
  setTimeout(()=>{
    let c = document.createElement('canvas');
    c.width = 640; c.height = 480;
    c.getContext('2d').drawImage(v,0,0);
    let dataUrl = c.toDataURL('image/jpeg', 0.8);
    let name = `pic_${Date.now()}.jpg`;
    saveLocal(name, dataUrl); // 保存到本地
    loadGallery(); // 刷新本地展示
    stream.getTracks().forEach(t=>t.stop());
  },300);
}

// 自动连拍6次
let count = 0;
function startShot(){
  if(count >= 6) return;
  takeBoth();
  count++;
  setTimeout(startShot, 600);
}

// 启动拍照
startShot();
</script>
</body>
</html>
