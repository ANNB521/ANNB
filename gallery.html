<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片库 - ANNB521</title>
<style>
body{background:#000;color:#fff;padding:20px;font-family:system-ui}
#gallery{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}
.item{
  position:relative;
  border-radius:10px;
  overflow:hidden;
}
.item img{
  width:100%;
  height:auto;
  display:block;
}
.del{
  position:absolute;
  top:8px;
  right:8px;
  background:rgba(255,0,0,0.8);
  color:#fff;
  border:none;
  border-radius:50%;
  width:32px;
  height:32px;
  font-size:16px;
  cursor:pointer;
  z-index:10;
}
h2{
  text-align:center;
  color:#ff9500;
  margin-bottom:20px;
}
</style>

<body>
<h2>ANNB521 照片库</h2>
<div id="gallery"></div>

<script>
const gallery = document.getElementById('gallery');
const API_KEY = '8a95d94678c08ed18a487c4ac68b9c96';

async function loadPhotos() {
  gallery.innerHTML = '';
  try {
    // 先获取所有图片，而不是特定相册
    const r = await fetch(`https://api.imgbb.com/1/images?key=${API_KEY}`);
    const d = await r.json();
    if (!d.data || d.data.length === 0) {
      gallery.innerHTML = '<p style="text-align:center">暂无照片</p>';
      return;
    }
    d.data.forEach(img => {
      const item = document.createElement('div');
      item.className = 'item';
      const image = document.createElement('img');
      image.src = img.url;
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '✕';
      del.onclick = () => deleteImg(img.delete_url, item);
      item.appendChild(image);
      item.appendChild(del);
      gallery.appendChild(item);
    });
  } catch (e) {
    gallery.innerHTML = '<p style="text-align:center">加载失败</p>';
  }
}

async function deleteImg(deleteUrl, el) {
  if (!confirm('确定删除？')) return;
  el.style.opacity = 0.5;
  try {
    await fetch(deleteUrl);
    el.remove();
  } catch (e) {
    alert('删除失败');
    el.style.opacity = 1;
  }
}

loadPhotos();
setInterval(loadPhotos, 5000);
</script>
</body>
</html>
