<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANNB521 - 照片库</title>
  <style>
    body {
      background: #121212;
      color: white;
      padding: 20px;
      font-family: sans-serif;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    h2 { color: #ff6000; }
    .clear-btn {
      background: #ff4d4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
    }
    .image-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .image-item {
      position: relative;
    }
    .image-item img {
      width: 100%;
      border-radius: 8px;
    }
    .del-btn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: rgba(255,0,0,0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .empty {
      text-align: center;
      color: #999;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>ANNB521 照片库</h2>
    <button class="clear-btn" id="clearAll">清空全部</button>
  </div>
  <div class="image-grid" id="images"></div>
  <div class="empty" id="empty" style="display: none;">暂无照片</div>

  <script>
    function loadImages() {
      const grid = document.getElementById('images');
      const empty = document.getElementById('empty');
      const images = JSON.parse(localStorage.getItem('pdd_images') || '[]');

      if (images.length === 0) {
        empty.style.display = 'block';
        grid.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = '';
      images.forEach((img, idx) => {
        const item = document.createElement('div');
        item.className = 'image-item';
        item.innerHTML = `
          <img src="${img}" alt="照片">
          <button class="del-btn" onclick="del(${idx})">×</button>
        `;
        grid.appendChild(item);
      });
    }

    function del(idx) {
      const arr = JSON.parse(localStorage.getItem('pdd_images') || '[]');
      arr.splice(idx, 1);
      localStorage.setItem('pdd_images', JSON.stringify(arr));
      loadImages();
    }

    document.getElementById('clearAll').addEventListener('click', () => {
      if (confirm('确定清空？')) {
        localStorage.removeItem('pdd_images');
        loadImages();
      }
    });

    loadImages();
  </script>
</body>
</html>
