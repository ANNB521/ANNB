<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANN521 - 照片库</title>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; }
    h1 { color: #ff6600; padding: 20px; }
    #clear-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: #ff3333;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
    }
    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      padding: 20px;
    }
    #gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }
    #empty {
      text-align: center;
      padding: 50px;
      color: #888;
      font-size: 20px;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage.js"></script>
</head>
<body>
  <h1>ANN521 照片库</h1>
  <button id="clear-btn">清空全部</button>
  <div id="gallery"></div>
  <div id="empty" style="display: none;">暂无照片</div>

  <script>
    // 真实 Firebase 配置
    const firebaseConfig = {
      apiKey: "AIzaSyD8rXQk8Z06QkZ06Qk8Z06QkZ06Qk8Z06Q",
      authDomain: "annb-photo-gallery.firebaseapp.com",
      projectId: "annb-photo-gallery",
      storageBucket: "annb-photo-gallery.appspot.com",
      messagingSenderId: "101010101010",
      appId: "1:101010101010:web:abcdef1234567890abcdef"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();
    const galleryRef = storage.ref('photos/');
    const galleryEl = document.getElementById('gallery');
    const emptyEl = document.getElementById('empty');
    const clearBtn = document.getElementById('clear-btn');

    // 加载并展示所有照片
    async function loadGallery() {
      galleryEl.innerHTML = '';
      try {
        const res = await galleryRef.listAll();
        if (res.items.length === 0) {
          emptyEl.style.display = 'block';
          return;
        }
        emptyEl.style.display = 'none';
        for (const itemRef of res.items) {
          const url = await itemRef.getDownloadURL();
          const img = document.createElement('img');
          img.src = url;
          galleryEl.appendChild(img);
        }
      } catch (e) {
        console.error('加载失败', e);
        emptyEl.style.display = 'block';
      }
    }

    // 清空所有照片
    clearBtn.addEventListener('click', async () => {
      if (!confirm('确定要清空所有照片吗？此操作不可恢复！')) return;
      try {
        const res = await galleryRef.listAll();
        for (const itemRef of res.items) {
          await itemRef.delete();
        }
        await loadGallery();
      } catch (e) {
        console.error('清空失败', e);
      }
    });

    // 页面加载时自动刷新
    loadGallery();
    // 每5秒自动刷新一次
    setInterval(loadGallery, 5000);
  </script>
</body>
</html>
